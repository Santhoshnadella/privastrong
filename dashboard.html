<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Provenance Tracking System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #05070a; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .stat-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%); }
        .glow-purple { box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
        .timeline-line { width: 2px; background: linear-gradient(to bottom, #8b5cf6, #ec4899); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const StatCard = ({ label, value, unit }) => (
            <div className="stat-card p-6 rounded-2xl border border-white/5 glow-purple">
                <div className="text-3xl font-bold text-white mb-1">
                    {value}{unit}
                </div>
                <div className="text-sm text-slate-400 font-medium uppercase tracking-wider">{label}</div>
            </div>
        );

        const Button = ({ children, onClick, icon, color = "purple" }) => {
            const colors = {
                purple: "bg-purple-600 hover:bg-purple-500",
                slate: "bg-slate-700 hover:bg-slate-600",
                pink: "bg-pink-600 hover:bg-pink-500"
            };
            return (
                <button 
                    onClick={onClick}
                    className={`${colors[color]} text-white px-5 py-2.5 rounded-xl flex items-center gap-2 transition-all active:scale-95 text-sm font-semibold`}
                >
                    <span>{icon}</span> {children}
                </button>
            );
        };

        function App() {
            const [timeElapsed, setTimeElapsed] = useState(0);
            const [stats, setStats] = useState({ hops: 0, devices: 0, derivatives: 0 });
            const [imageInfo, setImageInfo] = useState(null);
            const [events, setEvents] = useState([]);

            useEffect(() => {
                const timer = setInterval(() => setTimeElapsed(prev => prev + 1), 1000);
                return () => clearInterval(timer);
            }, []);

            const handleUpload = () => {
                setImageInfo({
                    id: "uuid-" + Math.random().toString(36).substr(2, 9),
                    watermark: "IMG-TRACK-772",
                    phash: "a7f3c2e9b4d8f1a6",
                    sha256: "9d4e1c67a32e8f9b2c6d3a7e4f8b9c2d...",
                    clip: "[512-dim vector]"
                });
                const uploadEvent = {
                    type: "Upload",
                    device: "MacBook-Pro-M3",
                    time: new Date().toLocaleTimeString(),
                    status: "Source Authenticated"
                };
                setEvents([uploadEvent]);
                setStats({ hops: 1, devices: 1, derivatives: 0 });
            };

            const handleShare = () => {
                if (!imageInfo) return;
                const newEvent = {
                    type: "Share",
                    device: "iPhone-15-Pro",
                    time: new Date().toLocaleTimeString(),
                    status: "Metadata Hashed"
                };
                setEvents([newEvent, ...events]);
                setStats(prev => ({ ...prev, hops: prev.hops + 1, devices: prev.devices + 1 }));
            };

            const reset = () => {
                setImageInfo(null);
                setEvents([]);
                setStats({ hops: 0, devices: 0, derivatives: 0 });
                setTimeElapsed(0);
            };

            return (
                <div className="max-w-6xl mx-auto space-y-8">
                    <header className="flex justify-between items-end">
                        <div>
                            <h1 className="text-3xl font-bold tracking-tight text-white">AI-aware Image Provenance</h1>
                            <p className="text-slate-400 mt-1">Complete architecture for image tracking and watermarking</p>
                        </div>
                        <div className="text-right hidden md:block">
                            <div className="text-xs font-bold text-purple-400 uppercase tracking-widest">System Status</div>
                            <div className="text-green-400 font-semibold flex items-center gap-2">
                                <span className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Production Ready
                            </div>
                        </div>
                    </header>

                    {/* Stats Row */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard label="Total Hops" value={stats.hops} />
                        <StatCard label="Unique Devices" value={stats.devices} />
                        <StatCard label="AI Derivatives" value={stats.derivatives} />
                        <StatCard label="Time Elapsed" value={timeElapsed} unit="s" />
                    </div>

                    {/* Main Content Area */}
                    <div className="grid lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 space-y-8">
                            {/* Original Image Info */}
                            <div className="glass rounded-3xl p-8">
                                <h3 className="text-xl font-bold mb-6 flex items-center gap-2">
                                    <span className="text-purple-500">◆</span> Original Image
                                </h3>
                                <div className="space-y-4 font-mono text-sm">
                                    <div className="flex justify-between border-b border-white/5 pb-2">
                                        <span className="text-slate-500 uppercase">ID</span>
                                        <span className="text-purple-400">{imageInfo?.id || "--"}</span>
                                    </div>
                                    <div className="flex justify-between border-b border-white/5 pb-2">
                                        <span className="text-slate-500 uppercase">Watermark</span>
                                        <span className="text-slate-300">{imageInfo?.watermark || "--"}</span>
                                    </div>
                                    <div className="bg-slate-900/50 p-4 rounded-xl space-y-2 mt-4">
                                        <div className="grid grid-cols-4 gap-2">
                                            <span className="text-slate-500">pHash:</span>
                                            <span className="col-span-3 text-slate-300 truncate">{imageInfo?.phash || "--"}</span>
                                        </div>
                                        <div className="grid grid-cols-4 gap-2">
                                            <span className="text-slate-500">SHA-256:</span>
                                            <span className="col-span-3 text-slate-300 truncate">{imageInfo?.sha256 || "--"}</span>
                                        </div>
                                        <div className="grid grid-cols-4 gap-2">
                                            <span className="text-slate-500">CLIP:</span>
                                            <span className="col-span-3 text-slate-300 truncate">{imageInfo?.clip || "--"}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Buttons Row */}
                            <div className="flex flex-wrap gap-3">
                                <Button onClick={handleUpload} icon="📤">Upload New Image</Button>
                                <Button onClick={handleShare} color="slate" icon="🔗">Share to Device</Button>
                                <Button onClick={() => setStats(s => ({...s, derivatives: s.derivatives+1}))} color="slate" icon="✨">Generate AI Derivative</Button>
                                <Button onClick={() => {}} color="slate" icon="🔍">Detect Re-entry</Button>
                                <Button onClick={reset} color="pink" icon="🔄">Reset</Button>
                            </div>

                            {/* Active Devices */}
                            <div className="space-y-4">
                                <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest">Active Devices</h3>
                                <div className="flex gap-4">
                                    {stats.devices > 0 ? (
                                        Array.from({length: stats.devices}).map((_, i) => (
                                            <div key={i} className="bg-slate-800/50 px-4 py-2 rounded-lg border border-white/5 flex items-center gap-2">
                                                <span className="w-2 h-2 bg-purple-500 rounded-full"></span>
                                                <span className="text-sm font-medium text-slate-300">Device_{i+1}</span>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="text-slate-600 text-sm italic">No active devices detected...</div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Distribution Timeline */}
                        <div className="space-y-6">
                            <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest">Distribution Timeline</h3>
                            <div className="relative pl-8 space-y-8">
                                <div className="absolute left-[11px] top-2 bottom-2 timeline-line"></div>
                                {events.length > 0 ? events.map((event, i) => (
                                    <div key={i} className="relative">
                                        <div className="absolute -left-[30px] top-1 w-6 h-6 rounded-full bg-slate-900 border-2 border-purple-500 flex items-center justify-center text-[10px]">
                                            {event.type === 'Upload' ? '↑' : '→'}
                                        </div>
                                        <div>
                                            <div className="flex justify-between items-start">
                                                <span className="font-bold text-white">{event.type}</span>
                                                <span className="text-[10px] text-slate-500 font-mono uppercase">{event.time}</span>
                                            </div>
                                            <div className="text-xs text-purple-400 mt-1">{event.device}</div>
                                            <div className="text-[10px] text-slate-500 mt-1 italic">{event.status}</div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="text-slate-600 text-sm italic">No events yet. Upload an image to begin.</div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
