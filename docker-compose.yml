version: '3.8'

services:
  db:
    image: ankane/pgvector
    environment:
      # ENFORCED: Must be set in .env
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD environment variable is required}
      POSTGRES_DB: image_provenance
      POSTGRES_USER: postgres
    ports:
      - "127.0.0.1:5432:5432" # Bind to localhost for security
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"

  api:
    build: .
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db/image_provenance
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "127.0.0.1:9090:9090" # Bind to localhost only

  grafana:
    image: grafana/grafana
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000" # Bind to localhost only

volumes:
  postgres_data:
